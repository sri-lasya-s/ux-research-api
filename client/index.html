<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UX Research Studies</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --accent: #2d5a3d;
      --accent2: #e8a838;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e0d9cc;
      --danger: #c0392b;
      --success: #2d5a3d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--accent);
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .api-badge {
      background: var(--accent2);
      color: #1a1a1a;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 10px 20px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .section { display: none; }
    .section.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #1e3d2a; }

    .btn-danger {
      background: var(--danger);
      color: white;
      padding: 6px 14px;
      font-size: 12px;
    }

    .btn-danger:hover { background: #a93226; }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }

    .studies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .study-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: box-shadow 0.2s;
    }

    .study-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

    .study-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      margin-bottom: 8px;
    }

    .study-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-methodology { background: #e8f4ea; color: var(--accent); }
    .badge-planned { background: #fef9e7; color: #d4a017; }
    .badge-in-progress { background: #eaf4fb; color: #2471a3; }
    .badge-completed { background: #e8f4ea; color: var(--accent); }

    .study-detail {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .study-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }

    .study-id {
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      word-break: break-all;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--accent);
      color: white;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .stat-number {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .methodology-bars { margin-top: 8px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-label { font-size: 13px; min-width: 140px; }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .bar-count { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 20px; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--danger); }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 15px;
    }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>UX Research Studies</h1>
    <p>Manage your research studies</p>
  </div>
  <span class="api-badge">API Client</span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('list')">All Studies</button>
    <button class="tab" onclick="switchTab('create')">Create Study</button>
    <button class="tab" onclick="switchTab('get')">Get Study</button>
    <button class="tab" onclick="switchTab('update')">Update Study</button>
    <button class="tab" onclick="switchTab('delete')">Delete Study</button>
    <button class="tab" onclick="switchTab('summary')">Summary</button>
  </div>

  <!-- LIST ALL -->
  <div id="list" class="section active">
    <div class="card">
      <h2>All Studies</h2>
      <button class="btn btn-primary" onclick="listStudies()">Refresh Studies</button>
      <div id="studies-grid" class="studies-grid" style="margin-top: 20px;">
        <div class="loading">Loading studies...</div>
      </div>
    </div>
  </div>

  <!-- CREATE -->
  <div id="create" class="section">
    <div class="card">
      <h2>Create New Study</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>Title</label>
          <input type="text" id="c-title" placeholder="e.g. Mobile Checkout Flow Study"/>
        </div>
        <div class="form-group">
          <label>Methodology</label>
          <select id="c-methodology">
            <option>Usability Testing</option>
            <option>Interview</option>
            <option>Survey</option>
            <option>Card Sorting</option>
            <option>A/B Testing</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="c-status">
            <option>Planned</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Participant Count</label>
          <input type="number" id="c-participants" placeholder="e.g. 12"/>
        </div>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="c-duration" placeholder="e.g. 45"/>
        </div>
        <div class="form-group full">
          <label>Researcher Name</label>
          <input type="text" id="c-researcher" placeholder="e.g. Jane Smith"/>
        </div>
      </div>
      <br/>
      <button class="btn btn-primary" onclick="createStudy()">Create Study</button>
      <div id="create-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- GET ONE -->
  <div id="get" class="section">
    <div class="card">
      <h2>Get Study by ID</h2>
      <div class="form-group">
        <label>Study ID</label>
        <input type="text" id="g-id" placeholder="Paste study ID here"/>
      </div>
      <br/>
      <button class="btn btn-primary" onclick="getStudy()">Get Study</button>
      <div id="get-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- UPDATE -->
  <div id="update" class="section">
    <div class="card">
      <h2>Update Study</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>Study ID</label>
          <input type="text" id="u-id" placeholder="Paste study ID here"/>
        </div>
        <div class="form-group full">
          <label>Title (optional)</label>
          <input type="text" id="u-title" placeholder="Leave empty to keep unchanged"/>
        </div>
        <div class="form-group">
          <label>Methodology (optional)</label>
          <select id="u-methodology">
            <option value="">-- Keep unchanged --</option>
            <option>Usability Testing</option>
            <option>Interview</option>
            <option>Survey</option>
            <option>Card Sorting</option>
            <option>A/B Testing</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status (optional)</label>
          <select id="u-status">
            <option value="">-- Keep unchanged --</option>
            <option>Planned</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Participant Count (optional)</label>
          <input type="number" id="u-participants" placeholder="Leave empty to keep unchanged"/>
        </div>
        <div class="form-group">
          <label>Duration Minutes (optional)</label>
          <input type="number" id="u-duration" placeholder="Leave empty to keep unchanged"/>
        </div>
        <div class="form-group full">
          <label>Researcher Name (optional)</label>
          <input type="text" id="u-researcher" placeholder="Leave empty to keep unchanged"/>
        </div>
      </div>
      <br/>
      <button class="btn btn-primary" onclick="updateStudy()">Update Study</button>
      <div id="update-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- DELETE -->
  <div id="delete" class="section">
    <div class="card">
      <h2>Delete Study</h2>
      <div class="form-group">
        <label>Study ID</label>
        <input type="text" id="d-id" placeholder="Paste study ID here"/>
      </div>
      <br/>
      <button class="btn btn-danger" onclick="deleteStudy()">Delete Study</button>
      <div id="delete-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="summary" class="section">
    <div class="card">
      <h2>Research Summary</h2>
      <button class="btn btn-primary" onclick="getSummary()">Load Summary</button>
      <div id="summary-content" style="margin-top: 24px;"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const API = 'https://backend-ux.azurewebsites.net';

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['list','create','get','update','delete','summary'][i] === name);
    });
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    if (name === 'list') listStudies();
    if (name === 'summary') getSummary();
  }

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function statusBadge(status) {
    const map = { 'Planned': 'badge-planned', 'In Progress': 'badge-in-progress', 'Completed': 'badge-completed' };
    return `<span class="badge ${map[status] || ''}">${status}</span>`;
  }

  async function listStudies() {
    const grid = document.getElementById('studies-grid');
    grid.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(`${API}/`);
      const data = await res.json();
      if (!data.length) { grid.innerHTML = '<div class="empty">No studies found.</div>'; return; }
      grid.innerHTML = data.map(s => `
        <div class="study-card">
          <div class="study-title">${s.title}</div>
          <div class="study-meta">
            <span class="badge badge-methodology">${s.methodology}</span>
            ${statusBadge(s.status)}
          </div>
          <div class="study-detail">👥 ${s.participantCount} participants</div>
          <div class="study-detail">⏱ ${s.durationMinutes} minutes</div>
          <div class="study-detail">🔬 ${s.researcherName}</div>
          <div class="study-id">ID: ${s.id}</div>
          <div class="study-actions">
            <button class="btn btn-danger" onclick="quickDelete('${s.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    } catch(e) { grid.innerHTML = '<div class="empty">Error loading studies.</div>'; }
  }

  async function quickDelete(id) {
    if (!confirm('Delete this study?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (res.ok) { showToast('Study deleted!'); listStudies(); }
    else showToast('Error deleting study', true);
  }

  async function createStudy() {
    const body = {
      title: document.getElementById('c-title').value,
      methodology: document.getElementById('c-methodology').value,
      status: document.getElementById('c-status').value,
      participantCount: parseInt(document.getElementById('c-participants').value),
      durationMinutes: parseInt(document.getElementById('c-duration').value),
      researcherName: document.getElementById('c-researcher').value
    };
    const res = await fetch(`${API}/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const el = document.getElementById('create-result');
    el.style.display = 'block';
    el.textContent = JSON.stringify(data, null, 2);
    if (res.ok) showToast('Study created! ✅');
    else showToast('Error: ' + data.message, true);
  }

  async function getStudy() {
    const id = document.getElementById('g-id').value;
    const res = await fetch(`${API}/${id}`);
    const data = await res.json();
    const el = document.getElementById('get-result');
    el.style.display = 'block';
    el.textContent = JSON.stringify(data, null, 2);
    if (!res.ok) showToast('Study not found', true);
  }

  async function updateStudy() {
    const id = document.getElementById('u-id').value;
    const body = {};
    const title = document.getElementById('u-title').value;
    const methodology = document.getElementById('u-methodology').value;
    const status = document.getElementById('u-status').value;
    const participants = document.getElementById('u-participants').value;
    const duration = document.getElementById('u-duration').value;
    const researcher = document.getElementById('u-researcher').value;
    if (title) body.title = title;
    if (methodology) body.methodology = methodology;
    if (status) body.status = status;
    if (participants) body.participantCount = parseInt(participants);
    if (duration) body.durationMinutes = parseInt(duration);
    if (researcher) body.researcherName = researcher;
    const res = await fetch(`${API}/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const el = document.getElementById('update-result');
    el.style.display = 'block';
    el.textContent = JSON.stringify(data, null, 2);
    if (res.ok) showToast('Study updated! ✅');
    else showToast('Error: ' + data.message, true);
  }

  async function deleteStudy() {
    const id = document.getElementById('d-id').value;
    if (!confirm('Are you sure you want to delete this study?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    const data = await res.json();
    const el = document.getElementById('delete-result');
    el.style.display = 'block';
    el.textContent = JSON.stringify(data, null, 2);
    if (res.ok) showToast('Study deleted! ✅');
    else showToast('Study not found', true);
  }

  async function getSummary() {
    const el = document.getElementById('summary-content');
    el.innerHTML = '<div class="loading">Loading summary...</div>';
    try {
      const res = await fetch(`${API}/summary`);
      const data = await res.json();
      const max = Math.max(...Object.values(data.byMethodology));
      el.innerHTML = `
        <div class="summary-grid">
          <div class="stat-card">
            <div class="stat-number">${data.totalStudies}</div>
            <div class="stat-label">Total Studies</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${data.averageParticipants}</div>
            <div class="stat-label">Avg Participants</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${Object.keys(data.byMethodology).length}</div>
            <div class="stat-label">Methodologies</div>
          </div>
        </div>
        <div class="card">
          <h2>By Methodology</h2>
          <div class="methodology-bars">
            ${Object.entries(data.byMethodology).map(([k, v]) => `
              <div class="bar-row">
                <div class="bar-label">${k}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width: ${(v/max)*100}%"></div>
                </div>
                <div class="bar-count">${v}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } catch(e) { el.innerHTML = '<div class="empty">Error loading summary.</div>'; }
  }

  // Load studies on start
  listStudies();
</script>
</body>
</html>
