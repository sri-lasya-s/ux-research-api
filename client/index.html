<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UX Research Studies</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button.delete { background: #dc3545; }
    button.update { background: #28a745; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    input, select, textarea { padding: 8px; margin: 5px; width: 200px; border: 1px solid #ddd; border-radius: 4px; }
    .form-section { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .summary-box { background: #e8f4f8; padding: 20px; border-radius: 8px; margin: 20px 0; }
    #message { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>UX Research Studies</h1>

  <!-- Message -->
  <div id="message" style="display:none"></div>

  <!-- List Studies -->
  <h2>All Studies</h2>
  <button onclick="loadStudies()">List All Studies</button>
  <table id="studies-table" style="display:none">
    <thead>
      <tr>
        <th>Title</th>
        <th>Type</th>
        <th>Status</th>
        <th>Researcher</th>
        <th>Duration</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="studies-body"></tbody>
  </table>

  <!-- Get Study by ID -->
  <div class="form-section">
    <h2>Get Study by ID</h2>
    <input id="get-id" placeholder="Enter Study ID" />
    <button onclick="getStudyById()">Get Study</button>
    <div id="get-result"></div>
  </div>

  <!-- Create Study -->
  <div class="form-section">
    <h2>Create New Study</h2>
    <input id="title" placeholder="Title" /><br>
    <select id="studyType">
      <option value="Usability">Usability</option>
      <option value="Interview">Interview</option>
      <option value="Survey">Survey</option>
      <option value="A/B Test">A/B Test</option>
    </select>
    <select id="status">
      <option value="Planned">Planned</option>
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
    </select><br>
    <input id="researcherName" placeholder="Researcher Name" />
    <input id="durationMinutes" type="number" placeholder="Duration (minutes)" /><br>
    <textarea id="notes" placeholder="Notes (optional)"></textarea><br>
    <button onclick="createStudy()">Create Study</button>
  </div>

  <!-- Update Study -->
  <div class="form-section">
    <h2>Update Study</h2>
    <input id="update-id" placeholder="Enter Study ID" /><br>
    <input id="update-title" placeholder="New Title (optional)" />
    <select id="update-studyType">
      <option value="">-- No Change --</option>
      <option value="Usability">Usability</option>
      <option value="Interview">Interview</option>
      <option value="Survey">Survey</option>
      <option value="A/B Test">A/B Test</option>
    </select>
    <select id="update-status">
      <option value="">-- No Change --</option>
      <option value="Planned">Planned</option>
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
    </select><br>
    <input id="update-researcherName" placeholder="New Researcher Name (optional)" />
    <input id="update-durationMinutes" type="number" placeholder="New Duration (optional)" /><br>
    <textarea id="update-notes" placeholder="New Notes (optional)"></textarea><br>
    <button class="update" onclick="updateStudy()">Update Study</button>
    <div id="update-result"></div>
  </div>

  <!-- Delete Study -->
  <div class="form-section">
    <h2>Delete Study</h2>
    <input id="delete-id" placeholder="Enter Study ID" />
    <button class="delete" onclick="deleteStudy()">Delete Study</button>
  </div>

  <!-- Summary -->
  <div class="summary-box">
    <h2>Studies Summary</h2>
    <button onclick="loadSummary()">Get Summary</button>
    <div id="summary-content"></div>
  </div>

  <script>
    const API_URL = 'https://ux-research-api.azurewebsites.net/client-api';

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = type;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    async function loadStudies() {
      const res = await fetch(`${API_URL}/`);
      const studies = await res.json();
      const tbody = document.getElementById('studies-body');
      const table = document.getElementById('studies-table');
      tbody.innerHTML = '';
      table.style.display = 'table';
      studies.forEach(s => {
        tbody.innerHTML += `
          <tr>
            <td>${s.title}</td>
            <td>${s.studyType}</td>
            <td>${s.status}</td>
            <td>${s.researcherName}</td>
            <td>${s.durationMinutes} mins</td>
            <td>${s.notes || '-'}</td>
            <td>
              <button class="delete" onclick="deleteStudyById('${s.id}')">Delete</button>
            </td>
          </tr>`;
      });
    }

    async function getStudyById() {
      const id = document.getElementById('get-id').value;
      if (!id) { showMessage('Please enter an ID!', 'error'); return; }
      const res = await fetch(`${API_URL}/${id}`);
      if (res.ok) {
        const s = await res.json();
        document.getElementById('get-result').innerHTML = `
          <table>
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>ID</td><td>${s.id}</td></tr>
            <tr><td>Title</td><td>${s.title}</td></tr>
            <tr><td>Type</td><td>${s.studyType}</td></tr>
            <tr><td>Status</td><td>${s.status}</td></tr>
            <tr><td>Researcher</td><td>${s.researcherName}</td></tr>
            <tr><td>Duration</td><td>${s.durationMinutes} mins</td></tr>
            <tr><td>Notes</td><td>${s.notes || '-'}</td></tr>
          </table>`;
      } else {
        showMessage('Study not found!', 'error');
      }
    }

    async function createStudy() {
      const body = {
        title: document.getElementById('title').value,
        studyType: document.getElementById('studyType').value,
        status: document.getElementById('status').value,
        researcherName: document.getElementById('researcherName').value,
        durationMinutes: parseInt(document.getElementById('durationMinutes').value),
        notes: document.getElementById('notes').value
      };
      if (!body.title || !body.researcherName || !body.durationMinutes) {
        showMessage('Please fill all required fields!', 'error');
        return;
      }
      const res = await fetch(`${API_URL}/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        showMessage('Study created successfully!', 'success');
      } else {
        showMessage('Error creating study!', 'error');
      }
    }

    async function updateStudy() {
      const id = document.getElementById('update-id').value;
      if (!id) { showMessage('Please enter an ID!', 'error'); return; }
      const body = {};
      const title = document.getElementById('update-title').value;
      const studyType = document.getElementById('update-studyType').value;
      const status = document.getElementById('update-status').value;
      const researcherName = document.getElementById('update-researcherName').value;
      const durationMinutes = document.getElementById('update-durationMinutes').value;
      const notes = document.getElementById('update-notes').value;
      if (title) body.title = title;
      if (studyType) body.studyType = studyType;
      if (status) body.status = status;
      if (researcherName) body.researcherName = researcherName;
      if (durationMinutes) body.durationMinutes = parseInt(durationMinutes);
      if (notes) body.notes = notes;
      const res = await fetch(`${API_URL}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        const s = await res.json();
        showMessage('Study updated successfully!', 'success');
        document.getElementById('update-result').innerHTML = `<p>Updated: ${s.title}</p>`;
      } else {
        showMessage('Error updating study!', 'error');
      }
    }

    async function deleteStudy() {
      const id = document.getElementById('delete-id').value;
      if (!id) { showMessage('Please enter an ID!', 'error'); return; }
      await deleteStudyById(id);
    }

    async function deleteStudyById(id) {
      const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      if (res.ok) {
        showMessage('Study deleted successfully!', 'success');
      } else {
        showMessage('Study not found!', 'error');
      }
    }

    async function loadSummary() {
      const res = await fetch(`${API_URL}/summary`);
      const data = await res.json();
      document.getElementById('summary-content').innerHTML = `
        <p><strong>Total Studies:</strong> ${data.totalStudies}</p>
        <p><strong>Average Duration:</strong> ${data.averageDuration} mins</p>
        <p><strong>By Status:</strong> Planned: ${data.byStatus.Planned}, Active: ${data.byStatus.Active}, Completed: ${data.byStatus.Completed}</p>
        <p><strong>By Type:</strong> Usability: ${data.byStudyType.Usability}, Interview: ${data.byStudyType.Interview}, Survey: ${data.byStudyType.Survey}, A/B Test: ${data.byStudyType["A/B Test"]}</p>
      `;
    }
  </script>
</body>
</html>
