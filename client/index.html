<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UX Research Studies</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    h2 { color: #555; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button.delete { background: #dc3545; }
    button.update { background: #28a745; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
    th { background: #f4f4f4; }
    input, select, textarea { padding: 8px; margin: 5px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
    .section { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .summary-box { background: #e8f4f8; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .msg { padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>UX Research Studies</h1>
  <div id="msg" class="msg"></div>

  <!-- 1. List Studies -->
  <div class="section">
    <h2>1. List All Studies</h2>
    <button onclick="listStudies()">List All Studies</button>
    <div id="list-result"></div>
  </div>

  <!-- 2. Get by ID -->
  <div class="section">
    <h2>2. Get Study by ID</h2>
    <input id="get-id" placeholder="Paste Study ID here" />
    <button onclick="getStudy()">Get Study</button>
    <div id="get-result"></div>
  </div>

  <!-- 3. Create Study -->
  <div class="section">
    <h2>3. Create New Study</h2>
    <input id="c-title" placeholder="Title" /><br>
    <select id="c-type">
      <option value="Usability">Usability</option>
      <option value="Interview">Interview</option>
      <option value="Survey">Survey</option>
      <option value="A/B Test">A/B Test</option>
    </select>
    <select id="c-status">
      <option value="Planned">Planned</option>
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
    </select><br>
    <input id="c-researcher" placeholder="Researcher Name" />
    <input id="c-duration" type="number" placeholder="Duration (mins)" /><br>
    <textarea id="c-notes" placeholder="Notes (optional)"></textarea><br>
    <button onclick="createStudy()">Create Study</button>
    <div id="create-result"></div>
  </div>

  <!-- 4. Update Study -->
  <div class="section">
    <h2>4. Update Study</h2>
    <input id="u-id" placeholder="Paste Study ID here" /><br>
    <input id="u-title" placeholder="New Title (optional)" />
    <select id="u-type">
      <option value="">-- No Change --</option>
      <option value="Usability">Usability</option>
      <option value="Interview">Interview</option>
      <option value="Survey">Survey</option>
      <option value="A/B Test">A/B Test</option>
    </select>
    <select id="u-status">
      <option value="">-- No Change --</option>
      <option value="Planned">Planned</option>
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
    </select><br>
    <input id="u-researcher" placeholder="New Researcher (optional)" />
    <input id="u-duration" type="number" placeholder="New Duration (optional)" /><br>
    <textarea id="u-notes" placeholder="New Notes (optional)"></textarea><br>
    <button class="update" onclick="updateStudy()">Update Study</button>
    <div id="update-result"></div>
  </div>

  <!-- 5. Delete Study -->
  <div class="section">
    <h2>5. Delete Study</h2>
    <input id="d-id" placeholder="Paste Study ID here" />
    <button class="delete" onclick="deleteStudy()">Delete Study</button>
    <div id="delete-result"></div>
  </div>

  <!-- 6. Summary -->
  <div class="summary-box">
    <h2>6. Studies Summary</h2>
    <button onclick="getSummary()">Get Summary</button>
    <div id="summary-result"></div>
  </div>

  <script>
    const BASE = 'https://ux-research-api.azurewebsites.net/client-api';

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function listStudies() {
      try {
        const res = await fetch(`${BASE}/studies`);
        const studies = await res.json();
        if (!Array.isArray(studies)) {
          document.getElementById('list-result').innerHTML = '<p style="color:red">Error loading studies</p>';
          return;
        }
        let html = `<table>
          <thead><tr>
            <th>ID (click to copy)</th>
            <th>Title</th><th>Type</th><th>Status</th>
            <th>Researcher</th><th>Duration</th><th>Notes</th>
          </tr></thead><tbody>`;
        studies.forEach(s => {
          html += `<tr>
            <td style="cursor:pointer;color:blue" title="${s.id}" onclick="copyId('${s.id}')">${s.id.substring(0,8)}...</td>
            <td>${s.title}</td>
            <td>${s.studyType}</td>
            <td>${s.status}</td>
            <td>${s.researcherName}</td>
            <td>${s.durationMinutes} mins</td>
            <td>${s.notes || '-'}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('list-result').innerHTML = html;
      } catch(e) {
        document.getElementById('list-result').innerHTML = '<p style="color:red">Error: ' + e.message + '</p>';
      }
    }

    function copyId(id) {
      navigator.clipboard.writeText(id);
      showMsg('ID copied to clipboard: ' + id, 'success');
    }

    async function getStudy() {
      const id = document.getElementById('get-id').value.trim();
      if (!id) { showMsg('Please enter an ID!', 'error'); return; }
      try {
        const res = await fetch(`${BASE}/studies/${id}`);
        const s = await res.json();
        if (!res.ok) { showMsg('Study not found!', 'error'); return; }
        document.getElementById('get-result').innerHTML = `<pre>${JSON.stringify(s, null, 2)}</pre>`;
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }

    async function createStudy() {
      const title = document.getElementById('c-title').value.trim();
      const studyType = document.getElementById('c-type').value;
      const status = document.getElementById('c-status').value;
      const researcherName = document.getElementById('c-researcher').value.trim();
      const durationMinutes = parseInt(document.getElementById('c-duration').value);
      const notes = document.getElementById('c-notes').value.trim();
      if (!title || !researcherName || !durationMinutes) {
        showMsg('Please fill title, researcher and duration!', 'error');
        return;
      }
      try {
        const res = await fetch(`${BASE}/studies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, studyType, status, researcherName, durationMinutes, notes })
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('Study created successfully!', 'success');
          document.getElementById('create-result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
          showMsg('Error creating study!', 'error');
        }
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }

    async function updateStudy() {
      const id = document.getElementById('u-id').value.trim();
      if (!id) { showMsg('Please enter an ID!', 'error'); return; }
      const body = {};
      const title = document.getElementById('u-title').value.trim();
      const studyType = document.getElementById('u-type').value;
      const status = document.getElementById('u-status').value;
      const researcherName = document.getElementById('u-researcher').value.trim();
      const durationMinutes = document.getElementById('u-duration').value;
      const notes = document.getElementById('u-notes').value.trim();
      if (title) body.title = title;
      if (studyType) body.studyType = studyType;
      if (status) body.status = status;
      if (researcherName) body.researcherName = researcherName;
      if (durationMinutes) body.durationMinutes = parseInt(durationMinutes);
      if (notes) body.notes = notes;
      try {
        const res = await fetch(`${BASE}/studies/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('Study updated successfully!', 'success');
          document.getElementById('update-result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
          showMsg('Study not found!', 'error');
        }
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }

    async function deleteStudy() {
      const id = document.getElementById('d-id').value.trim();
      if (!id) { showMsg('Please enter an ID!', 'error'); return; }
      try {
        const res = await fetch(`${BASE}/studies/${id}`, { method: 'DELETE' });
        if (res.ok) {
          showMsg('Study deleted successfully!', 'success');
          document.getElementById('delete-result').innerHTML = '<p style="color:green">Study deleted!</p>';
        } else {
          showMsg('Study not found!', 'error');
        }
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }

    async function getSummary() {
      try {
        const res = await fetch(`${BASE}/summary`);
        const data = await res.json();
        document.getElementById('summary-result').innerHTML = `
          <p><strong>Total Studies:</strong> ${data.totalStudies}</p>
          <p><strong>Average Duration:</strong> ${data.averageDuration} mins</p>
          <p><strong>By Status:</strong> Planned: ${data.byStatus.Planned}, Active: ${data.byStatus.Active}, Completed: ${data.byStatus.Completed}</p>
          <p><strong>By Type:</strong> Usability: ${data.byStudyType.Usability}, Interview: ${data.byStudyType.Interview}, Survey: ${data.byStudyType.Survey}, A/B Test: ${data.byStudyType["A/B Test"]}</p>
        `;
      } catch(e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
